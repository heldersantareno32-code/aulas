<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>

body{
    font-family: 'Courier New', Courier, monospace;

}div:hover{
    color: red;
}
div:hover > p{
    color: red;
    display: block;
    color: white;
    background-color: black;
}
div>p{

    display: none;
}

    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>passe o mouse sobre o texto a baixo</p>
    <div>
        passe o mouse aqui
    <p>texto escondido</p>
    </div>
    <p>fim do exemplo</p>
</body>
</html>

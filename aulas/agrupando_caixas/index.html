<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agrupando caixas</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background-color:white;
            
        }
        nav{
            padding: 10px 20px;
            margin: 2px;
            border: 20px ;
            outline: 10px 20px;
            background-color: aqua;
           box-shadow: 1px 2px 2px 0px rgba(0, 0, 255, 0.438);
           border-radius: 10px 10px;
        }
        nav>a{
            text-decoration: none;
            margin-right: 40px;
            
        }
        a:hover{
            text-decoration: underline;
            color: brown;
        }
        main{
            background-color: aqua;
            margin: 1px;
            border: 10px;
             background-color: aqua;
           box-shadow: 1px 2px 2px 0px rgba(0, 0, 255, 0.438);
           border-radius: 10px 1px;
        }section>h1{
            color: blue;
            text-align: center;
        }
        footer{
            background-color: aqua;
            text-align: center;
            background-color: aqua;
           box-shadow: 1px 2px 2px 0px rgba(0, 0, 255, 0.438);
            border: 4px;
            padding: 5px;
            border-radius: 10px 10px;
        }aside:hover{
            color: rebeccapurple;
        }footer>p{
            margin: 0px;
        }
        aside>p{
            text-align: justify;
            font-weight: bold;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <header>
<nav>
    <a href="#">link</a>
 <a href="#">link</a> 
 <a href="#">link</a>
</nav>
    </header>
    <main>
<section id="titulo">
    <H1>titulo</H1>
    <aside>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Reprehenderit illo enim dolor molestias illum ipsam porro, minima, quo aliquid deleniti consectetur dolorum, saepe sequi. Dolores vel aperiam unde ipsa aut?</p>
    </aside>
</section>

    </main>
    <footer>
<p>desenvolvido por: helder santareno</p>

    </footer>
</body>
</html>
